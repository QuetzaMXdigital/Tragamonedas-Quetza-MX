<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Cocktail Demo - Jalisco Edition</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
<nav class="global-header">
    <div class="logo">QUETZA <span class="tag">Pulse</span></div>
    <div class="wallet-info">
        <span class="label">Billetera Global:</span>
        <span id="saldo-global" class="balance">5000</span> <span class="currency">QC</span>
    </div>
</nav>
    <div class="maquinita-container">
        
        <div class="marcadores">
            <div class="display">PREMIO: <span id="premio">0</span></div>
            <div class="display display-principal">CRÉDITOS: <span id="creditos">1000</span></div>
            <div class="display">APUESTA: <span id="apuesta">0</span></div>
        </div>

        <div class="tablero">
            <div class="panel-central">
                <h1>FRUIT COCKTAIL</h1>
                <p>Edición Jalisco</p>
                </div>

            <div class="casilla" id="casilla-0">0</div>
            <div class="casilla" id="casilla-1">1</div>
            <div class="casilla" id="casilla-2">2</div>
            <div class="casilla" id="casilla-3">3</div>
            <div class="casilla" id="casilla-4">4</div>
            <div class="casilla" id="casilla-5">5</div>
            <div class="casilla" id="casilla-6">6</div>
            <div class="casilla" id="casilla-7">7</div>
            <div class="casilla" id="casilla-8">8</div>
            <div class="casilla" id="casilla-9">9</div>
            <div class="casilla" id="casilla-10">10</div>
            <div class="casilla" id="casilla-11">11</div>
            <div class="casilla" id="casilla-12">12</div>
            <div class="casilla" id="casilla-13">13</div>
            <div class="casilla" id="casilla-14">14</div>
            <div class="casilla" id="casilla-15">15</div>
            <div class="casilla" id="casilla-16">16</div>
            <div class="casilla" id="casilla-17">17</div>
            <div class="casilla" id="casilla-18">18</div>
            <div class="casilla" id="casilla-19">19</div>
            <div class="casilla" id="casilla-20">20</div>
            <div class="casilla" id="casilla-21">21</div>
            <div class="casilla" id="casilla-22">22</div>
            <div class="casilla" id="casilla-23">23</div>
        </div>

        <div class="controles">
            <button class="btn-apuesta">🍉<br>Sandía</button>
            <button class="btn-apuesta">⭐<br>Estrella</button>
            <button class="btn-apuesta">🍒<br>Cereza</button>
            <button class="btn-accion btn-cobrar">Cobrar</button>
            <button class="btn-accion btn-jugar" id="btn-jugar">JUGAR</button>
        </div>

    </div>
<script src="script.js"></script>
</body>
</html>
