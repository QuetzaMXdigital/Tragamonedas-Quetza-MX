<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Cocktail - Quetza MX</title>
    <link rel="stylesheet" href="style.css?v=11">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="quetza-banco.js"></script>
</head>
<body>
    <nav class="global-header">
        <div class="logo">QUETZA <span class="tag">Pulse</span></div>
        <div class="wallet-info">
            <span class="label">Billetera Global:</span>
            <span id="saldo-global" class="balance">0</span> <span class="currency">QC</span>
        </div>
    </nav>

    <div class="maquinita-container">
        <div class="marcadores">
            <div class="display">PREMIO DE SESIÓN: <span id="premio">0</span></div>
            <div class="display">APUESTA MESA: <span id="apuesta-total">0</span></div>
        </div>

       <div class="tablero">
    <div class="panel-central">
        <img src="logo_centro.png" class="logo-centro-img">
    </div>

    <div class="casilla" id="casilla-0"></div>
    <div class="casilla" id="casilla-1"></div>
    <div class="casilla" id="casilla-2"></div>
    <div class="casilla" id="casilla-3"></div>
    <div class="casilla" id="casilla-4"></div>
    <div class="casilla" id="casilla-5"></div>
    <div class="casilla" id="casilla-6"></div>

    <div class="casilla" id="casilla-7"></div>
    <div class="casilla" id="casilla-8"></div>
    <div class="casilla" id="casilla-9"></div>
    <div class="casilla" id="casilla-10"></div>
    <div class="casilla" id="casilla-11"></div>

    <div class="casilla" id="casilla-12"></div>
    <div class="casilla" id="casilla-13"></div>
    <div class="casilla" id="casilla-14"></div>
    <div class="casilla" id="casilla-15"></div>
    <div class="casilla" id="casilla-16"></div>
    <div class="casilla" id="casilla-17"></div>
    <div class="casilla" id="casilla-18"></div>

    <div class="casilla" id="casilla-19"></div>
    <div class="casilla" id="casilla-20"></div>
    <div class="casilla" id="casilla-21"></div>
    <div class="casilla" id="casilla-22"></div>
    <div class="casilla" id="casilla-23"></div>
</div>
        <div class="panel-apuestas">
            </div>

        <div class="controles-principales">
            <button class="btn-accion btn-cobrar" id="btn-cobrar">COBRAR</button>
            <button class="btn-accion btn-jugar" id="btn-jugar">JUGAR</button>
        </div>
        <div id="modal-victoria" class="modal-oculto">
            <div class="modal-contenido">
                <img src="notificacion.jpg" alt="¡Ganaste!" class="img-victoria">
                <h2 id="texto-victoria">¡GANASTE 0 QC!</h2>
                <button id="btn-cerrar-modal" class="btn-accion btn-jugar" style="margin-top: 15px; width: 100%;">¡INCREÍBLE!</button>
            </div>
        </div>

    </div> 
    
    <audio id="audio-moneda" src="moneda.mp3"></audio>
    <audio id="audio-giro" src="giro.mp3"></audio>
    <audio id="audio-premio" src="premio.mp3"></audio>
    <audio id="audio-cobrar" src="cobrar.mp3"></audio>

    <script>
        // Declaramos estas variables globales para que tu script.js pueda verlas
        let usuarioLogueado = null;
        let saldoDisponible = 0;

        window.onload = () => {
            // inicializarBancoEnPagina viene de quetza-banco.js
            inicializarBancoEnPagina((user, saldo) => {
                usuarioLogueado = user;
                saldoDisponible = saldo;
                
                // Actualizar el marcador visual en el HTML
                document.getElementById('saldo-global').innerText = saldoDisponible;
            });
        };
    </script>

    <script src="script.js?v=10"></script>
</body>
</html>
